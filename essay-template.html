<style>
  :root {
    --text: #141210;
    --text-secondary: #6b6560;
    --accent: #a0522d;
    --bg: #fdfcfa;
    --border: #e8e4de;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Newsreader', Georgia, serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.75;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: rgba(160, 82, 45, 0.15); }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 100px;
    animation: rise 0.55s ease-out;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }

  .back-link {
    font-family: 'Outfit', sans-serif;

    color: var(--text-secondary);

    letter-spacing: 0.02em;
    display: inline-block;
    margin-bottom: 48px;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }

  article h1 {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.25;
    margin-bottom: 12px;
  }

  .meta {
    font-family: 'Outfit', sans-serif;
    font-size: 13.5px;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
    margin-bottom: 40px;
  }

  article p {
    font-size: 18px;
    margin-bottom: 22px;
  }

  article a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  article a:hover { border-bottom-color: var(--accent); }

  article h2 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 40px 0 14px;
  }

  article h3 {
    font-size: 18px;
    font-weight: 600;
    margin: 32px 0 10px;
  }

  article blockquote {
    border-left: 3px solid var(--border);
    padding-left: 20px;
    margin: 24px 0;
    color: var(--text-secondary);
    font-style: italic;
  }

  article ul, article ol {
    margin: 0 0 22px 24px;
    font-size: 18px;
  }

  article li { margin-bottom: 6px; }

  article code {
    font-family: 'Menlo', monospace;
    font-size: 15px;
    background: var(--border);
    padding: 1px 6px;
    border-radius: 3px;
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 48px 0;
  }

  footer {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 56px;
  }

  footer a {
    color: var(--text-secondary);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    transition: color 0.2s, border-color 0.2s;
  }
  footer a:hover { color: var(--text); border-color: var(--text); }

  @media (max-width: 480px) {
    .container { padding: 36px 20px 72px; }
    article h1 { font-size: 26px; }
    article p, article ul, article ol { font-size: 16.5px; }
  }
